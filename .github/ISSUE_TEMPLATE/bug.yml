name: Bug report
description: Report reproducible incorrect behavior in Lumeri.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include the smallest reliable steps and a safe sample file if possible.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS/Linux, Python version, FFmpeg version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Remove API keys, tokens, private media paths, and personal information first.
      render: shell
