id: transition+color-grade
trigger_skills: [transition, color-grade]
trigger_keywords_min: [转场, 调色]
plan_template:
  - id: step_1
    function: gemia.video.transitions.transition_dissolve
    args:
      duration: 0.5
    input: "$input"
  - id: step_2
    function: gemia.picture.color.color_grade
    args:
      preset: warm
    input: "$step_1"
    output: "$output"
