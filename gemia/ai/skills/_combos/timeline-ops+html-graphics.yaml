id: timeline-ops+html-graphics
trigger_skills: [timeline-ops, html-graphics]
trigger_keywords_min: [字幕]
plan_template:
  - id: step_1
    function: gemia.video.timeline.cut
    args:
      start_sec: 0
      end_sec: 5
    input: "$input"
  - id: step_2
    function: gemia.video.subtitles.auto_subtitle
    args:
      language: zh
    input: "$step_1"
    output: "$output"
