id: timeline-ops+color-grade
trigger_skills: [timeline-ops, color-grade]
trigger_keywords_min: [调色]
plan_template:
  - id: step_1
    function: gemia.video.timeline.cut
    args:
      start_sec: 0
      end_sec: 5
    input: "$input"
  - id: step_2
    function: gemia.picture.color.color_grade
    args:
      preset: natural
    input: "$step_1"
    output: "$output"
