<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumeri Video</title>
<link rel="icon" type="image/svg+xml" href="/v3/lumeri-favicon.svg" />
<link rel="stylesheet" href="/v3/v3.css" />
</head>
<body>
<header class="app-header">
  <span class="brand">
    <img class="brand-logo" src="/v3/lumeri-mark.svg" alt="Lumeri" width="26" height="19" />
    <h1>Lumeri Video</h1>
  </span>
</header>

<main class="app-main">
  <!-- LEFT · preview stage: browser-style tab strip, then the active tab's content -->
  <section class="preview-stage" id="preview-stage" data-tab="preview">
    <div class="stage-tabbar" id="stage-tabs" role="tablist" aria-label="工作区视图">
      <div class="stage-tab-list" id="stage-tab-list"></div>
      <button type="button" id="stage-add-btn" class="stage-add-btn" title="添加视图" aria-label="添加视图" aria-haspopup="menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-plus"/></svg>
      </button>
      <span class="stage-tabbar-spacer"></span>
      <button type="button" id="stage-overflow-btn" class="stage-add-btn" title="更多" aria-label="更多操作" aria-haspopup="menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-more"/></svg>
      </button>
      <div id="stage-add-menu" class="stage-add-menu" hidden role="menu" aria-label="添加视图"></div>
      <div id="stage-overflow-menu" class="stage-add-menu stage-overflow-menu" hidden role="menu" aria-label="更多操作"></div>
    </div>

    <!-- full-area workspace view (outline / tasks / files) shown instead of the preview -->
    <div class="stage-panel" id="stage-panel" hidden>
      <div class="panel-tray-body" id="panel-tray-body"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <img class="empty-mark" src="/v3/lumeri-mark.svg" alt="Lumeri" width="92" height="66" />
      <h2 class="empty-title">开始创作</h2>
      <p class="empty-sub">在右侧描述你想要的视频</p>
    </div>

    <div class="stage-scroll" id="stage-scroll">
      <div class="asset-grid" id="asset-grid"></div>
    </div>

    <!-- CapCut-style project timeline: collapsible drawer, auto-opens when a timeline exists -->
    <div class="timeline-drawer" id="timeline-drawer">
      <section id="project-timeline-panel" class="ptl"></section>
    </div>
  </section>

  <!-- RIGHT · chat rail: session head, history, cohesive input -->
  <aside class="chat-rail" id="chat-rail">
    <div class="rail-head">
      <!-- connection dot + session id kept for JS wiring but no longer shown (user request) -->
      <span class="status-pill" id="connection-pill" role="status" title="offline" aria-label="offline" hidden></span>
      <span class="session-id" id="session-id-label" hidden>—</span>
      <span class="rail-head-spacer"></span>
      <button type="button" id="new-session-btn" class="rail-btn icon-btn" title="新会话" aria-label="新会话"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-new-chat"/></svg></button>
      <button type="button" id="account-btn" class="account-btn rail-btn icon-btn" title="登录 / 账户" aria-label="登录 / 账户"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-user"/></svg></button>
    </div>

    <div class="rail-history" id="rail-history">
      <div class="timeline" id="timeline" hidden></div>
      <div class="rail-empty" id="rail-empty">
        <p class="rail-empty-hint">试试这样开始</p>
        <button type="button" class="suggest-chip" data-suggest="做一支 30 秒的产品宣传片，冰蓝色调，节奏干净利落">30 秒产品宣传片</button>
        <button type="button" class="suggest-chip" data-suggest="把素材库里的视频剪成 15 秒竖版短片">剪一支 15 秒竖版</button>
        <button type="button" class="suggest-chip" data-suggest="给当前成片配上中文字幕">给成片配中文字幕</button>
        <button type="button" class="suggest-chip" data-suggest="从素材里找出最好的三个镜头，拼成一段预览">挑出最好的镜头</button>
      </div>
    </div>

    <!-- plan approval bar: filled by v3.js while plan mode is on -->
    <div id="plan-bar" class="plan-bar" hidden></div>

    <!-- ask dock: rendered by v3.js when elicit awaits a user answer -->
    <div id="ask-dock" class="ask-dock" hidden></div>

    <!-- cohesive input shell: one piece, two states (collapsed pill ↔ grown card) -->
    <footer class="composer input-shell" id="input-shell">
      <!-- slash-command palette (unchanged behavior), anchored to the shell -->
      <div id="slash-menu" class="slash-menu" hidden></div>

      <!-- "+" popover: the single entry point for everything -->
      <div id="plus-menu" class="plus-menu" hidden role="menu" aria-label="添加">
        <button type="button" id="upload-btn" class="plus-item" role="menuitem">
          <svg class="plus-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-attach"/></svg>
          <span class="plus-label">上传</span>
          <span class="plus-tail">⌘U</span>
        </button>
        <button type="button" class="plus-item" data-plus="slash" role="menuitem">
          <svg class="plus-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-slash"/></svg>
          <span class="plus-label">快捷指令</span>
          <span class="plus-tail">/</span>
        </button>

        <div class="plus-divider" role="separator"></div>
        <div class="plus-item plus-switch" data-plus="plan" role="menuitemcheckbox" aria-checked="false" tabindex="0">
          <svg class="plus-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-list-check"/></svg>
          <span class="plus-label">计划模式</span>
          <button type="button" id="plan-toggle-btn" class="plan-toggle switch" title="计划模式：只查看和规划，批准后才执行改动">计划</button>
        </div>
        <div class="plus-item plus-switch" data-plus="sandbox" role="menuitemcheckbox" aria-checked="true" tabindex="0">
          <svg class="plus-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-shield"/></svg>
          <span class="plus-label">沙盒</span>
          <button type="button" id="sandbox-toggle-btn" class="sandbox-toggle switch" title="沙盒已开启（点击关闭）">沙盒</button>
        </div>

        <div class="plus-divider" role="separator"></div>
        <button type="button" class="plus-item" data-plus="assets" role="menuitem">
          <svg class="plus-ico" viewBox="0 0 24 24" aria-hidden="true"><use href="#i-grid"/></svg>
          <span class="plus-label">素材库</span>
          <span class="plus-tail">›</span>
        </button>
      </div>

      <input type="file" id="upload-input" hidden />
      <button type="button" id="plus-btn" class="plus-btn" aria-haspopup="menu" aria-expanded="false" title="添加" aria-label="添加">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-plus"/></svg>
      </button>
      <textarea
        id="prompt-input"
        rows="1"
        placeholder="描述你想要的视频，或输入 / 唤起命令…"
      ></textarea>
      <button type="button" id="send-btn" class="send-btn" disabled aria-label="发送">
        <svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-send"/></svg>
      </button>
    </footer>
  </aside>
</main>

<!-- Assets tray: summoned media library (moved here, ids kept) -->
<div id="assets-tray" class="assets-tray" hidden>
  <div class="assets-tray-panel">
    <div class="assets-tray-head">
      <h2 class="pane-heading">媒体库</h2>
      <div class="assets-tray-actions">
        <button type="button" id="library-refresh-btn" class="library-small-btn icon-btn" title="刷新" aria-label="刷新"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-refresh"/></svg></button>
        <button type="button" id="library-annotate-btn" class="library-small-btn icon-btn" title="标注视频" aria-label="标注视频"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-wand"/></svg></button>
        <button type="button" id="assets-tray-close" class="library-small-btn icon-btn" title="关闭" aria-label="关闭"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="#i-close"/></svg></button>
      </div>
    </div>
    <div class="media-library-grid" id="media-library-grid">
      <p class="placeholder">登录后可用</p>
    </div>
  </div>
</div>

<!-- Login dialog: Google + email one-time-code, built/handled in v3.js -->
<div id="auth-modal" class="auth-modal" hidden>
  <div class="auth-backdrop" data-auth-close></div>
  <div class="auth-dialog" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <button type="button" class="auth-x" data-auth-close aria-label="关闭">×</button>

    <!-- Signed-out view -->
    <div class="auth-view" id="auth-view-signin">
      <div class="auth-brand">
        <img src="/v3/lumeri-mark.svg" alt="" width="40" height="29" />
        <h2 id="auth-title">登录 Lumeri Video</h2>
      </div>

      <button type="button" id="auth-google-btn" class="auth-google" hidden>
        <svg viewBox="0 0 18 18" width="18" height="18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.81.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/>
        </svg>
        使用 Google 账号登录
      </button>

      <div class="auth-divider" id="auth-divider" hidden><span>或</span></div>

      <!-- Email step 1: request a code -->
      <form class="auth-step" id="auth-email-form">
        <label class="auth-field">
          <input type="email" id="auth-email" placeholder="邮箱" aria-label="邮箱" autocomplete="email" required />
        </label>
        <button type="submit" id="auth-send-code" class="auth-primary">发送验证码</button>
      </form>

      <!-- Email step 2: enter the code -->
      <form class="auth-step" id="auth-code-form" hidden>
        <p class="auth-code-hint">验证码已发送至 <strong id="auth-code-target"></strong></p>
        <label class="auth-field">
          <input type="text" id="auth-code" inputmode="numeric" maxlength="6" placeholder="6 位验证码" aria-label="验证码" autocomplete="one-time-code" />
        </label>
        <button type="submit" id="auth-verify" class="auth-primary">登录</button>
        <div class="auth-code-actions">
          <button type="button" id="auth-resend" class="auth-link" disabled>重新发送</button>
          <button type="button" id="auth-change-email" class="auth-link">换个邮箱</button>
        </div>
      </form>

      <p class="auth-error" id="auth-error" hidden></p>
    </div>

    <!-- Signed-in view -->
    <div class="auth-view" id="auth-view-account" hidden>
      <div class="auth-brand">
        <div class="auth-avatar" id="auth-avatar" aria-hidden="true"></div>
        <p class="auth-sub" id="auth-account-email"></p>
      </div>
      <button type="button" id="auth-logout" class="auth-secondary">退出登录</button>
    </div>
  </div>
</div>

<script src="/v3/v3.js" defer></script>
</body>
</html>
