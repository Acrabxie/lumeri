<!doctype html>
<!--
  Lumeri CLI — Preview monitor.

  Additive companion to the v3 web UI (does NOT touch v3.html/v3.js/v3.css).
  Opened by the `lumeri` terminal client as:
      /v3/preview.html?session=<session_id>
  It ATTACHES to the session the CLI already created (it never creates one) and
  renders a read-only preview: the latest produced asset on a cinema stage, a
  filmstrip of all assets, and live turn activity. There is no chat input — the
  terminal drives, this window only shows.

  Same-origin with the sidecar, so /sessions/<id>/stream (SSE) and the asset
  URLs work without CORS. Protocol mirrors static/v3/v3.js.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumeri · Preview</title>
<style>
  :root {
    --bg: #0c0d10;
    --panel: #141519;
    --panel-2: #1b1d22;
    --line: #2a2d34;
    --text: #e8e9ec;
    --muted: #8b8f99;
    --brand: #e6b450;
    --brand-dim: #9a7b3a;
    --video: #c792ea;
    --image: #82aaff;
    --audio: #c3e88d;
    --ok: #98c379;
    --err: #e06c75;
    --warn: #e5c07b;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #15171c 0%, var(--bg) 60%);
    color: var(--text);
    font: 14px/1.5 ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px; border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    flex: 0 0 auto;
  }
  .wordmark { font-weight: 700; letter-spacing: .14em; color: var(--brand); font-size: 15px; }
  .wordmark .spark { margin-right: 6px; }
  .sub { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 11px; border-radius: 999px; font-size: 12px;
    background: var(--panel-2); border: 1px solid var(--line); color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .pill.live .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .pill.connecting .dot, .pill.reconnecting .dot { background: var(--warn); animation: pulse 1s infinite; }
  .pill.offline .dot { background: var(--err); }
  .session { color: var(--muted); font-size: 12px; }
  .session b { color: var(--text); font-weight: 600; }

  main { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 18px; gap: 14px; }

  .stage {
    position: relative; flex: 1; min-height: 0;
    background: #000; border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 120px rgba(0,0,0,.7), 0 18px 50px rgba(0,0,0,.45);
  }
  .stage video, .stage img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  .stage audio { width: min(680px, 80%); }
  .stage .audio-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; color: var(--audio); }
  .stage .audio-wrap .glyph { font-size: 84px; opacity: .85; }

  .empty { text-align: center; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .empty .ring { width: 54px; height: 54px; border-radius: 50%; border: 2px solid var(--line); border-top-color: var(--brand); animation: spin 1.1s linear infinite; }
  .empty.idle .ring { animation: none; border-top-color: var(--line); opacity: .5; }
  .empty .big { font-size: 16px; color: var(--text); letter-spacing: .02em; }

  .activity {
    position: absolute; left: 16px; right: 16px; bottom: 16px;
    display: none; align-items: center; gap: 12px;
    padding: 11px 15px; border-radius: 11px;
    background: rgba(16,17,21,.82); backdrop-filter: blur(8px); border: 1px solid var(--line);
  }
  .activity.on { display: flex; }
  .activity .spinner { width: 15px; height: 15px; border-radius: 50%; border: 2px solid var(--brand-dim); border-top-color: var(--brand); animation: spin .8s linear infinite; flex: 0 0 auto; }
  .activity .verb { color: var(--brand); font-weight: 600; }
  .activity .msg { color: var(--muted); }
  .activity .bar { flex: 1; height: 5px; border-radius: 3px; background: var(--panel-2); overflow: hidden; min-width: 60px; }
  .activity .bar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--brand-dim), var(--brand)); transition: width .2s ease; }
  .activity .pct { color: var(--muted); font-variant-numeric: tabular-nums; width: 38px; text-align: right; }

  .filmstrip { flex: 0 0 auto; display: flex; gap: 12px; overflow-x: auto; padding: 4px 2px 8px; min-height: 96px; }
  .filmstrip:empty::after { content: "produced clips will appear here"; color: var(--muted); font-size: 12px; align-self: center; padding-left: 4px; }
  .thumb {
    position: relative; flex: 0 0 auto; width: 132px; height: 80px; border-radius: 9px; overflow: hidden;
    background: var(--panel); border: 1px solid var(--line); cursor: pointer; transition: border-color .15s, transform .15s;
  }
  .thumb:hover { transform: translateY(-2px); border-color: #3a3e47; }
  .thumb.active { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand); }
  .thumb video, .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }
  .thumb .kind { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; }
  .thumb .label { position: absolute; left: 0; right: 0; bottom: 0; padding: 3px 7px; font-size: 11px;
    background: linear-gradient(transparent, rgba(0,0,0,.82)); color: #d8dadf; display: flex; justify-content: space-between; gap: 6px; }
  .thumb .label .id { font-family: ui-monospace, Menlo, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .thumb .final { position: absolute; top: 5px; right: 5px; font-size: 10px; padding: 1px 6px; border-radius: 6px;
    background: var(--brand); color: #1a1205; font-weight: 700; letter-spacing: .03em; }

  .toasts { position: fixed; top: 60px; right: 16px; display: flex; flex-direction: column; gap: 8px; z-index: 20; }
  .toast { padding: 9px 13px; border-radius: 9px; font-size: 12.5px; background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
    max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,.4); animation: rise .25s ease; }
  .toast.err { border-color: var(--err); color: #f3c0c4; }
  .toast.warn { border-color: var(--warn); color: #f0dca8; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 50% { opacity: .35; } }
  @keyframes rise { from { opacity: 0; transform: translateY(-6px); } }
</style>
</head>
<body>
  <header>
    <span class="wordmark"><span class="spark">✦</span>LUMERI</span>
    <span class="sub">preview</span>
    <span class="spacer"></span>
    <span class="session">session <b id="sid">—</b></span>
    <span class="pill connecting" id="pill"><span class="dot"></span><span id="pillText">connecting</span></span>
  </header>

  <main>
    <div class="stage" id="stage">
      <div class="empty" id="empty">
        <div class="ring"></div>
        <div class="big">Waiting for Lumeri…</div>
        <div>drive it from your terminal — results appear here</div>
      </div>
      <div class="activity" id="activity">
        <span class="spinner"></span>
        <span class="verb" id="actVerb">working</span>
        <span class="msg" id="actMsg"></span>
        <span class="bar"><i id="actBar"></i></span>
        <span class="pct" id="actPct"></span>
      </div>
    </div>
    <div class="filmstrip" id="filmstrip"></div>
  </main>

  <div class="toasts" id="toasts"></div>

<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const sessionId = params.get("session") || params.get("s") || "";
  $("sid").textContent = sessionId || "—";

  const state = {
    assets: new Map(),   // id -> { id, kind, summary, final }
    activeId: null,
    lastEventId: null,
    es: null,
    reconnectTimer: null,
    running: new Map(),  // call_id -> verb
  };

  const assetUrl = (id) => `/sessions/${encodeURIComponent(sessionId)}/assets/${encodeURIComponent(id)}`;
  const kindOf = (id) => (String(id).startsWith("img_") ? "image" : String(id).startsWith("aud_") ? "audio" : "video");
  const kindIcon = { video: "▶", image: "🖼", audio: "♪" };

  // ── connection pill ────────────────────────────────────────────────
  function setPill(text, cls) {
    const p = $("pill");
    p.className = "pill " + cls;
    $("pillText").textContent = text;
  }

  // ── toasts ─────────────────────────────────────────────────────────
  function toast(text, cls) {
    const el = document.createElement("div");
    el.className = "toast " + (cls || "");
    el.textContent = text;
    $("toasts").appendChild(el);
    setTimeout(() => { el.style.transition = "opacity .3s"; el.style.opacity = "0"; setTimeout(() => el.remove(), 320); }, 4200);
  }

  // ── stage ──────────────────────────────────────────────────────────
  function showAsset(id) {
    const a = state.assets.get(id);
    if (!a) return;
    state.activeId = id;
    const stage = $("stage");
    // remove any existing media but keep #empty and #activity nodes
    [...stage.querySelectorAll("[data-media]")].forEach((n) => n.remove());
    $("empty").style.display = "none";

    let media;
    if (a.kind === "image") {
      media = document.createElement("img");
      media.src = assetUrl(id);
    } else if (a.kind === "audio") {
      const wrap = document.createElement("div");
      wrap.className = "audio-wrap";
      wrap.innerHTML = '<div class="glyph">♪</div>';
      const au = document.createElement("audio");
      au.src = assetUrl(id); au.controls = true; au.autoplay = true;
      wrap.appendChild(au);
      media = wrap;
    } else {
      media = document.createElement("video");
      media.src = assetUrl(id);
      media.controls = true; media.autoplay = true; media.loop = true;
      media.muted = true; media.playsInline = true;
    }
    media.setAttribute("data-media", "1");
    stage.appendChild(media);
    renderStrip();
  }

  // ── filmstrip ──────────────────────────────────────────────────────
  function renderStrip() {
    const strip = $("filmstrip");
    // Guard: skip the full innerHTML rebuild (which re-fetches every thumbnail
    // <video src>) when nothing visible changed. renderStrip runs on each added
    // asset, turn_complete and resync; without this it re-pulled all
    // /sessions/{id}/assets/{aid} thumbnails on every call.
    const sig = (state.activeId || "") + "|" +
      [...state.assets.values()].map((a) => `${a.id}:${a.kind}:${a.final ? 1 : 0}`).join(",");
    if (sig === state._stripSig) return;
    state._stripSig = sig;
    strip.innerHTML = "";
    for (const a of state.assets.values()) {
      const t = document.createElement("div");
      t.className = "thumb" + (a.id === state.activeId ? " active" : "");
      t.title = a.summary || a.id;
      let inner = "";
      if (a.kind === "image") {
        inner = `<img src="${assetUrl(a.id)}" alt="">`;
      } else if (a.kind === "video") {
        inner = `<video src="${assetUrl(a.id)}#t=0.1" muted preload="metadata"></video>`;
      } else {
        inner = `<div class="kind" style="color:var(--audio)">♪</div>`;
      }
      t.innerHTML =
        inner +
        (a.final ? `<span class="final">final</span>` : "") +
        `<span class="label"><span class="id">${a.id}</span><span>${kindIcon[a.kind] || "▶"}</span></span>`;
      t.addEventListener("click", () => showAsset(a.id));
      strip.appendChild(t);
    }
  }

  function addAsset(id, kind, summary) {
    if (!id) return;
    const existing = state.assets.get(id);
    if (existing) {
      if (summary) existing.summary = summary;
    } else {
      state.assets.set(id, { id, kind: kind || kindOf(id), summary: summary || "", final: false });
    }
    showAsset(id); // newest becomes the stage
  }

  // ── activity overlay ───────────────────────────────────────────────
  function setActivity(on, verb, msg, percent) {
    const a = $("activity");
    a.classList.toggle("on", !!on);
    if (verb != null) $("actVerb").textContent = verb;
    $("actMsg").textContent = msg || "";
    if (typeof percent === "number") {
      $("actBar").style.width = Math.max(0, Math.min(100, percent)) + "%";
      $("actPct").textContent = Math.round(percent) + "%";
    } else {
      $("actBar").style.width = "0%";
      $("actPct").textContent = "";
    }
  }
  function idleEmptyIfBlank() {
    if (state.assets.size === 0) {
      const e = $("empty");
      e.style.display = "flex";
      e.classList.add("idle");
      e.querySelector(".big").textContent = "Nothing produced yet";
    }
  }

  // ── SSE handlers (mirror static/v3/v3.js) ──────────────────────────
  const handlers = {
    turn_start: () => { setActivity(true, "thinking", "", null); },
    model_text_delta: () => {},
    model_tool_call_start: (ev) => {
      state.running.set(ev.call_id, ev.tool_name || "tool");
      setActivity(true, ev.tool_name || "working", "", null);
    },
    model_tool_call_ready: () => {},
    tool_exec_start: (ev) => {
      setActivity(true, state.running.get(ev.call_id) || "working", "running…", null);
    },
    tool_exec_progress: (ev) => {
      setActivity(true, state.running.get(ev.call_id) || "working", ev.message || "", typeof ev.percent === "number" ? ev.percent : null);
    },
    tool_exec_result: (ev) => {
      const r = ev.result || {};
      if (r.asset_id) addAsset(r.asset_id, r.kind, r.summary);
      state.running.delete(ev.call_id);
      setActivity(state.running.size > 0, "working", "", null);
    },
    tool_exec_error: (ev) => {
      state.running.delete(ev.call_id);
      toast((ev.tool_name ? ev.tool_name + ": " : "") + (ev.error || "tool failed"), "err");
      setActivity(state.running.size > 0, "working", "", null);
    },
    budget_gate: (ev) => {
      toast("budget gate: " + (ev.reason || "blocked"), "warn");
    },
    timeline_op: () => {},
    replay_gap: () => { resync(); },
    turn_complete: (ev) => {
      const finals = ev.final_asset_ids || ev.deliverable_asset_ids || [];
      for (const id of finals) {
        const a = state.assets.get(id) || { id, kind: kindOf(id), summary: "", final: false };
        a.final = true;
        state.assets.set(id, a);
      }
      if (finals.length) showAsset(finals[finals.length - 1]);
      else renderStrip();
      setActivity(false);
      idleEmptyIfBlank();
    },
    turn_error: (ev) => {
      toast("turn error: " + (ev.error || "unknown"), "err");
      setActivity(false);
      idleEmptyIfBlank();
    },
  };

  function dispatch(ev) {
    const h = handlers[ev.kind];
    if (h) h(ev);
  }

  // ── REST + SSE ─────────────────────────────────────────────────────
  async function loadInitial() {
    try {
      const info = await fetch(`/sessions/${encodeURIComponent(sessionId)}`).then((r) => r.ok ? r.json() : null);
      if (info && info.latest_event_id != null) state.lastEventId = info.latest_event_id;
      const list = info && Array.isArray(info.assets) ? info.assets : [];
      for (const a of list) {
        const id = a.asset_id || a.id;
        if (id) state.assets.set(id, { id, kind: a.kind || kindOf(id), summary: a.summary || "", final: !!a.final });
      }
      if (state.assets.size) {
        const last = [...state.assets.keys()].pop();
        showAsset(last);
      } else {
        idleEmptyIfBlank();
      }
    } catch (_) { /* will still try the stream */ }
  }

  function connect() {
    if (state.es) { state.es.close(); state.es = null; }
    const qs = state.lastEventId != null ? `?last_event_id=${encodeURIComponent(state.lastEventId)}` : "";
    const es = new EventSource(`/sessions/${encodeURIComponent(sessionId)}/stream${qs}`);
    state.es = es;
    es.onopen = () => { clearTimeout(state.reconnectTimer); setPill("live", "live"); };
    es.onerror = () => {
      setPill("reconnecting", "reconnecting");
      clearTimeout(state.reconnectTimer);
      state.reconnectTimer = setTimeout(connect, 1500);
    };
    es.onmessage = (e) => {
      if (e.lastEventId) state.lastEventId = e.lastEventId;
      try { dispatch(JSON.parse(e.data)); } catch (_) {}
    };
  }

  async function resync() {
    try {
      const info = await fetch(`/sessions/${encodeURIComponent(sessionId)}`).then((r) => r.ok ? r.json() : null);
      if (info && info.latest_event_id != null) state.lastEventId = info.latest_event_id;
      if (info && Array.isArray(info.assets)) {
        for (const a of info.assets) {
          const id = a.asset_id || a.id;
          if (id && !state.assets.has(id)) state.assets.set(id, { id, kind: a.kind || kindOf(id), summary: a.summary || "", final: !!a.final });
        }
        renderStrip();
      }
    } catch (_) {}
    connect();
  }

  if (!sessionId) {
    setPill("no session", "offline");
    $("empty").querySelector(".big").textContent = "No session in the URL";
    $("empty").classList.add("idle");
  } else {
    document.title = `Lumeri · ${sessionId}`;
    loadInitial().then(connect);
  }
})();
</script>
</body>
</html>
