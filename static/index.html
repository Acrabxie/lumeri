<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f7; color: #1d1d1f; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}

header {
  padding: 10px 20px; background: #ffffff;
  border-bottom: 1px solid #e5e5e5;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 700; color: #e94560; letter-spacing: -0.5px; }
header span { font-size: 12px; color: #666; }

.layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ── Sidebars ── */
.sidebar {
  width: 200px; padding: 12px 8px; overflow-y: auto;
  background: #fbfbfb; flex-shrink: 0;
}
.sidebar-left  { border-right: 1px solid #e5e5e5; }
.sidebar-right { border-left:  1px solid #e5e5e5; }
.sidebar h2 {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px;
  color: #555; margin-bottom: 8px; padding: 0 6px;
}
.list-item {
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  font-size: 12px; margin-bottom: 3px;
  border: 1px solid transparent; transition: all 0.12s;
}
.list-item:hover { background: #f0f0f0; border-color: #ddd; }
.list-item.active { background: #e8f2ff; border-color: #007aff; }
.task-id { font-size: 10px; color: #999; word-break: break-all; margin-top: 2px; }
.badge {
  display: inline-block; font-size: 9px; padding: 1px 5px;
  border-radius: 3px; margin-top: 3px; font-weight: 600;
}
.badge.running { background: #3d2d00; color: #fbbf24; }
.badge.done    { background: #0d2e1a; color: #4ade80; }
.badge.error   { background: #2e0d0d; color: #f87171; }
.badge.pending { background: #1a1a3e; color: #818cf8; }

/* ── Main area ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.preview {
  height: 38%; flex-shrink: 0;
  background: #000000; border-bottom: 1px solid #e5e5e5;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.preview video { max-width: 100%; max-height: 100%; display: block; }

/* ── Timeline ── */
.timeline-container {
  height: 120px; background: #1a1a1a; border-top: 1px solid #333;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.timeline-ruler {
  height: 24px; border-bottom: 1px solid #333; position: relative;
  background: #252525; display: flex; align-items: flex-end; padding-bottom: 4px;
}
.timeline-tick {
  position: absolute; width: 1px; background: #555; height: 8px;
}
.timeline-tick-label {
  position: absolute; font-size: 9px; color: #888; transform: translateX(4px);
}
.timeline-tracks {
  flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; padding: 10px 0;
}
.timeline-track {
  height: 32px; background: rgba(255,255,255,0.05); margin-bottom: 4px;
  position: relative; width: 2000px; /* Dynamic width based on duration */
}
.timeline-clip {
  position: absolute; height: 24px; top: 4px; background: #3d5afe;
  border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; padding: 0 8px; font-size: 10px; color: white;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; transition: filter 0.1s;
}
.timeline-clip:hover { filter: brightness(1.2); }
.timeline-playhead {
  position: absolute; top: 0; bottom: 0; width: 2px; background: #e94560;
  z-index: 10; pointer-events: none;
}
.timeline-playhead::after {
  content: ''; position: absolute; top: 0; left: -4px; 
  border-left: 5px solid transparent; border-right: 5px solid transparent;
  border-top: 8px solid #e94560;
}
.preview-placeholder { color: #333; text-align: center; user-select: none; }
.preview-placeholder svg { display: block; margin: 0 auto 10px; }
.preview-placeholder p { font-size: 13px; }

/* ── Chat history ── */
.chat-history {
  flex: 1; overflow-y: auto;
  padding: 12px 16px; display: flex;
  flex-direction: column; gap: 8px;
  min-height: 0;
}
.chat-empty {
  color: #333; font-size: 12px; font-family: monospace;
  letter-spacing: 0.05em; margin-top: 8px;
}
.bubble-user {
  align-self: flex-end; max-width: 76%;
  background: rgba(0,200,180,0.1);
  border: 1px solid rgba(0,200,180,0.25);
  color: #7ee8dc;
  border-radius: 14px 14px 2px 14px;
  padding: 8px 13px; font-size: 13px; line-height: 1.6;
  word-break: break-word; white-space: pre-wrap;
}
.bubble-ai {
  align-self: flex-start; max-width: 76%;
  background: #ffffff;
  border: 1px solid #e5e5e5;
  color: #444;
  border-radius: 14px 14px 14px 2px;
  padding: 8px 13px; font-size: 12px; font-family: monospace;
  line-height: 1.6; word-break: break-word;
  display: flex; align-items: flex-start; gap: 8px;
}
.bubble-ai .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; flex-shrink: 0; margin-top: 5px;
}
.bubble-ai.running .dot { background: #fbbf24; animation: pulse 1.2s ease-in-out infinite; }
.bubble-ai.done    .dot { background: #4ade80; }
.bubble-ai.error   .dot { background: #f87171; }
.bubble-ai.asking  .dot { background: #60a5fa; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
}

/* ── Input area ── */
.input-area {
  background: #ffffff; border-top: 1px solid #e5e5e5;
  padding: 12px 14px; flex-shrink: 0;
}
.input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
.input-row:last-child { margin-bottom: 0; }
.field { flex: 1; }
.field label {
  display: block; font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.8px; color: #666; margin-bottom: 5px;
}
.field input, .field textarea, .field select {
  width: 100%; background: #ffffff; border: 1px solid #ddd;
  color: #1d1d1f; border-radius: 6px; padding: 7px 10px;
  font-size: 13px; outline: none; resize: none;
  transition: border-color 0.12s; font-family: inherit;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: #e94560; }
.field select { appearance: none; }

.run-btn {
  padding: 9px 22px; background: #e94560; color: #fff;
  border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.12s; white-space: nowrap; height: fit-content;
}
.run-btn:hover:not(:disabled) { background: #c73652; }
.run-btn:disabled { background: #444; cursor: not-allowed; }

.status-line {
  font-size: 11px; color: #555; min-height: 14px;
  transition: color 0.15s; margin-top: 6px;
}
.status-line.running { color: #fbbf24; }
.status-line.done    { color: #4ade80; }
.status-line.error   { color: #f87171; }

/* ── Ask panel ── */
.ask-panel {
  background: #0f2040; border-top: 1px solid #2563eb;
  padding: 12px 14px; flex-shrink: 0; display: none; flex-direction: column; gap: 10px;
}
.ask-panel.visible { display: flex; }
.ask-panel-header {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: #60a5fa; font-weight: 600;
}
.ask-question { display: flex; flex-direction: column; gap: 5px; }
.ask-question label { font-size: 12px; color: #cbd5e1; }
.ask-question input {
  background: #0a0a18; border: 1px solid #1d2d50; color: #e0e0e0;
  border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none;
  transition: border-color 0.12s; font-family: inherit; width: 100%;
}
.ask-question input:focus { border-color: #2563eb; }
.ask-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
.ask-btn {
  padding: 7px 16px; background: #2563eb; color: #fff;
  border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.12s;
}
.ask-btn:hover:not(:disabled) { background: #1d4ed8; }
.ask-btn:disabled { background: #444; cursor: not-allowed; }
.ask-dismiss { font-size: 11px; color: #555; cursor: pointer; }
.ask-dismiss:hover { color: #999; }

/* ── Mode tabs ── */
.mode-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.mode-tab {
  padding: 4px 12px; border-radius: 5px; font-size: 11px; font-weight: 600;
  cursor: pointer; border: 1px solid transparent; color: #555;
  text-transform: uppercase; letter-spacing: 0.6px; transition: all 0.12s;
}
.mode-tab.active { background: #0f3460; border-color: #e94560; color: #e0e0e0; }
.mode-tab:not(.active):hover { background: #1a1a3e; color: #aaa; }
.mode-section { display: none; }
.mode-section.visible { display: block; }

/* ── Media pool ── */
.media-item {
  margin-bottom: 8px; border-radius: 6px; overflow: hidden;
  border: 1px solid #1a2a4a; cursor: pointer; transition: border-color 0.12s;
  background: #0a0a18;
}
.media-item:hover { border-color: #e94560; }
.media-item.selected { border-color: #e94560; }
.media-thumb {
  width: 100%; aspect-ratio: 16/9; display: block;
  object-fit: cover; background: #0d0d1a;
}
.media-thumb-canvas {
  width: 100%; aspect-ratio: 16/9; display: block;
  background: #0d0d1a;
}
.media-name {
  font-size: 10px; color: #888; padding: 4px 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── DEV drawer ── */
#dev-btn {
  position: fixed; bottom: 16px; right: 16px;
  width: 42px; height: 24px;
  background: #1e1e1e; border: 1px solid #333; border-radius: 5px;
  cursor: pointer; z-index: 1000; font-size: 10px;
  font-family: monospace; color: #555; letter-spacing: 0.08em;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
#dev-btn:hover { border-color: #666; color: #aaa; }
#dev-drawer {
  position: fixed; bottom: 52px; right: 16px; width: 340px;
  background: #141414; border: 1px solid #2a2a2a; border-radius: 12px;
  z-index: 999; display: none; flex-direction: column; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
#dev-drawer.open { display: flex; }
#dev-drawer-header {
  padding: 10px 14px; border-bottom: 1px solid #222;
  font-size: 10px; font-family: monospace; color: #555;
  letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
#dev-drawer-header span { color: #e94560; }
#dev-log {
  flex: 1; max-height: 220px; overflow-y: auto;
  padding: 10px 14px; display: flex; flex-direction: column; gap: 6px;
  font-size: 12px; font-family: monospace;
}
.dev-entry-user {
  align-self: flex-end; background: rgba(233,69,96,0.1);
  border: 1px solid rgba(233,69,96,0.2); color: #e94560;
  border-radius: 8px 8px 2px 8px; padding: 6px 10px;
  max-width: 90%; word-break: break-word; white-space: pre-wrap;
}
.dev-entry-cc {
  align-self: flex-start; background: rgba(255,255,255,0.03);
  border: 1px solid #222; color: #666;
  border-radius: 8px 8px 8px 2px; padding: 6px 10px;
  max-width: 90%; word-break: break-word;
}
#dev-input-row {
  display: flex; gap: 8px; padding: 10px 14px;
  border-top: 1px solid #222;
}
#dev-input {
  flex: 1; background: #0d0d0d; border: 1px solid #2a2a2a;
  color: #ccc; border-radius: 6px; padding: 6px 10px;
  font-size: 12px; font-family: monospace; outline: none; resize: none;
  line-height: 1.5;
}
#dev-input:focus { border-color: #444; }
#dev-send {
  background: #222; border: 1px solid #333; color: #888;
  border-radius: 6px; padding: 6px 12px; font-size: 11px;
  font-family: monospace; cursor: pointer; transition: all 0.12s;
  white-space: nowrap; align-self: flex-end;
}
#dev-send:hover { border-color: #555; color: #ccc; }
</style>
</head>
<body>

<header>
  <h1>Gemia</h1>
  <span>AI 视频工作流</span>
</header>

<div class="layout">

  <!-- Left: task history -->
  <div class="sidebar sidebar-left">
    <h2>媒体池</h2>
    <div id="media-pool"><span style="font-size:11px;color:#444;padding:6px">尚未上传视频</span></div>
  </div>

  <!-- Center -->
  <div class="main">

    <!-- Video preview -->
    <div class="preview" id="preview">
      <div class="preview-placeholder">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="m10 8 5 4-5 4V8z"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>输出视频将显示在这里</p>
      </div>
    </div>

    <!-- Chat history -->
    <div class="chat-history" id="chat-history">
      <div class="chat-empty" id="chat-empty">&gt; 上传视频后输入指令...</div>
    </div>

    <!-- Ask panel -->
    <div class="ask-panel" id="ask-panel">
      <div class="ask-panel-header">✦ Gemia 需要更多信息</div>
      <div id="ask-questions"></div>
      <div class="ask-actions">
        <button class="ask-btn" id="ask-submit-btn" onclick="submitAnswers()">提交回答</button>
        <span class="ask-dismiss" onclick="dismissAsk()">取消</span>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <!-- Video + upload row -->
      <div class="input-row">
        <div class="field" style="flex:1.6">
          <label>输入视频</label>
          <select id="inp-video"></select>
        </div>
        <div class="field">
          <label>上传 MP4</label>
          <input id="upload-video" type="file" accept="video/mp4" onchange="uploadVideo(this)">
        </div>
      </div>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <div class="mode-tab active" id="tab-ai" onclick="switchMode('ai')">✦ AI 指令</div>
        <div class="mode-tab" id="tab-skill" onclick="switchMode('skill')">技能</div>
      </div>

      <!-- AI mode -->
      <div class="mode-section visible" id="mode-ai">
        <div class="input-row">
          <div class="field">
            <label>告诉 AI 要做什么（/code 内容 可让 AI 改源码）</label>
            <textarea id="inp-prompt" rows="2"
              placeholder="e.g. 裁前10秒，加速1.5倍&#10;/code 把预览区背景改为黑色"></textarea>
          </div>
          <button class="run-btn" id="ai-run-btn" onclick="runPrompt()">✦ 执行</button>
        </div>
      </div>

      <!-- Skill mode -->
      <div class="mode-section" id="mode-skill">
        <div class="input-row">
          <div class="field">
            <label>技能</label>
            <input id="inp-skill" type="text" placeholder="从右侧列表选择 →" readonly style="cursor:pointer">
          </div>
          <div class="field">
            <label>风格 / 提示词</label>
            <textarea id="inp-style" rows="2" placeholder="e.g. 赛博朋克风格，霓虹灯效果"></textarea>
          </div>
          <button class="run-btn" id="run-btn" onclick="runSkill()">&#9654;&#xFE0E; 执行</button>
        </div>
        <div class="input-row">
          <div class="field">
            <label>修改反馈</label>
            <textarea id="inp-feedback" rows="2" placeholder="e.g. 颜色再复古一点，更柔和"></textarea>
          </div>
          <button class="run-btn" id="revise-btn" onclick="reviseTask()">修改</button>
        </div>
      </div>

      <div class="status-line" id="status"></div>
    </div>

  </div>

  <!-- Right: skills list -->
  <div class="sidebar sidebar-right">
    <h2>技能库</h2>
    <div id="skill-list"><span style="font-size:11px;color:#444;padding:6px">加载中...</span></div>
  </div>

</div>

<!-- DEV floating button -->
<div id="dev-btn" onclick="toggleDev()">DEV</div>

<!-- DEV drawer -->
<div id="dev-drawer">
  <div id="dev-drawer-header">
    <span>DEV</span> UI 反馈 → cc
  </div>
  <div id="dev-log">
    <div class="dev-entry-cc">输入 UI 反馈，cc 读取后修改代码。</div>
  </div>
  <div id="dev-input-row">
    <textarea id="dev-input" rows="2" placeholder="描述 UI 问题或改进建议..."></textarea>
    <button id="dev-send" onclick="sendDevFeedback()">发送</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let selectedSkill = null;
let selectedVideoPath = null;
let tasks = [];
let pollTimer = null;
let taskRefreshTimer = null;
let activeTaskId = null;
let currentAskId = null;
let currentStatusBubble = null;  // tracks the latest AI status bubble el

// ── Chat ───────────────────────────────────────────────────────────────
function addChatBubble(role, text, cls) {
  const history = document.getElementById('chat-history');
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  if (role === 'user') {
    div.className = 'bubble-user';
    div.textContent = text;
  } else {
    div.className = 'bubble-ai' + (cls ? ' ' + cls : '');
    const dot = document.createElement('div');
    dot.className = 'dot';
    const span = document.createElement('span');
    span.textContent = text;
    div.appendChild(dot);
    div.appendChild(span);
  }
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

function updateStatusBubble(text, cls) {
  if (!currentStatusBubble) return;
  const span = currentStatusBubble.querySelector('span');
  if (span) span.textContent = text;
  currentStatusBubble.className = 'bubble-ai' + (cls ? ' ' + cls : '');
}

// ── Init ───────────────────────────────────────────────────────────────
(async function init() {
  await checkApiKey();
  await loadSkills();
  await loadMediaPool();
})();

// ── First-run API key check ─────────────────────────────────────────────
async function checkApiKey() {
  try {
    const res = await fetch('/config');
    const { has_key } = await res.json();
    if (!has_key) showApiKeyModal();
  } catch (e) { /* server not ready yet */ }
}

function showApiKeyModal() {
  const overlay = document.createElement('div');
  overlay.id = 'key-modal-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.85);
    display:flex;align-items:center;justify-content:center;z-index:9999;
  `;
  overlay.innerHTML = `
    <div style="background:#1a1a2e;border:1px solid #0f3460;border-radius:14px;
                padding:28px;width:400px;max-width:92vw;">
      <h2 style="color:#e94560;font-size:18px;margin-bottom:8px;">设置 API Key</h2>
      <p style="color:#888;font-size:13px;line-height:1.55;margin-bottom:20px;">
        Gemia 需要 OpenRouter API Key 来规划和执行任务。
        Key 保存在 <code style="color:#aaa">~/.gemia/config.json</code>，不上传。
      </p>
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:12px;color:#ccc;margin-bottom:5px;">
          OpenRouter API Key <span style="color:#e94560">*</span>
        </label>
        <input id="modal-or-key" type="password" placeholder="sk-or-..."
          style="width:100%;background:#111;border:1px solid #333;border-radius:7px;
                 color:#e0e0e0;font-size:14px;padding:9px 11px;" autocomplete="off">
        <div style="font-size:11px;color:#555;margin-top:4px;">必填 · 在 openrouter.ai 获取</div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;color:#ccc;margin-bottom:5px;">
          Gemini API Key <span style="color:#555">（可选）</span>
        </label>
        <input id="modal-gemini-key" type="password" placeholder="AIza..."
          style="width:100%;background:#111;border:1px solid #333;border-radius:7px;
                 color:#e0e0e0;font-size:14px;padding:9px 11px;" autocomplete="off">
        <div style="font-size:11px;color:#555;margin-top:4px;">可选 · 用于 Nano Banana 图像生成</div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button id="modal-save-btn"
          style="background:#e94560;color:#fff;border:none;border-radius:8px;
                 padding:9px 22px;font-size:14px;font-weight:600;cursor:pointer;">
          保存并继续
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('modal-save-btn').addEventListener('click', async () => {
    const orKey = document.getElementById('modal-or-key').value.trim();
    if (!orKey) { alert('请输入 OpenRouter API Key'); return; }
    const geminiKey = document.getElementById('modal-gemini-key').value.trim();
    try {
      const res = await fetch('/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ openrouter_api_key: orKey, gemini_api_key: geminiKey }),
      });
      if (res.ok) { overlay.remove(); }
      else { alert('保存失败，请重试'); }
    } catch (e) { alert('保存失败: ' + e.message); }
  });
}

// ── Skills ─────────────────────────────────────────────────────────────
async function loadSkills() {
  try {
    const res = await fetch('/skills');
    const { skills, inputs } = await res.json();
    const el = document.getElementById('skill-list');
    el.innerHTML = '';
    skills.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'list-item' + (i === 0 ? ' active' : '');
      const skillId = (typeof s === 'object') ? s.id : s;
      const skillName = (typeof s === 'object') ? s.name : s;
      const skillDesc = (typeof s === 'object' && s.description) ? s.description : '';
      div.innerHTML = `<strong style="display:block;font-size:13px">${skillName}</strong>` +
        (skillDesc ? `<span style="font-size:11px;color:#888;white-space:normal;line-height:1.3">${skillDesc}</span>` : '');
      div.title = skillDesc;
      div.onclick = () => pickSkill(skillId, skillName, div);
      el.appendChild(div);
      if (i === 0) pickSkill(skillId, skillName, div);
    });
    if (!skills.length) el.innerHTML = '<span style="font-size:11px;color:#444;padding:6px">No skills found</span>';
    loadInputs(inputs || []);
  } catch (e) {
    document.getElementById('skill-list').innerHTML = '<span style="font-size:11px;color:#f87171;padding:6px">Error</span>';
  }
}

function pickSkill(skillId, skillName, el) {
  selectedSkill = skillId;
  document.getElementById('inp-skill').value = skillName || skillId;
  document.querySelectorAll('#skill-list .list-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
}

function loadInputs(inputs, preferredPath = null) {
  const select = document.getElementById('inp-video');
  select.innerHTML = '';
  if (!inputs.length) {
    const option = document.createElement('option');
    option.value = '';
    option.textContent = 'No input videos found';
    select.appendChild(option);
    selectedVideoPath = '';
    return;
  }
  inputs.forEach((item, i) => {
    const option = document.createElement('option');
    option.value = item.path;
    option.textContent = item.name;
    select.appendChild(option);
    if (i === 0 && !selectedVideoPath) selectedVideoPath = item.path;
  });
  select.onchange = () => { selectedVideoPath = select.value; };
  select.value = preferredPath || selectedVideoPath || inputs[0].path;
  selectedVideoPath = select.value;
}

async function refreshInputs(preferredPath = null) {
  const res = await fetch('/skills');
  const data = await res.json();
  loadInputs(data.inputs || [], preferredPath);
}

async function uploadVideo(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  setStatus('Uploading video…', 'running');
  setRunBusy(true);
  try {
    const res = await fetch('/upload-video', {
      method: 'POST',
      headers: { 'Content-Type': 'application/octet-stream', 'X-Filename': file.name },
      body: file
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed');
    await loadMediaPool();
    selectedVideoPath = data.path;
    document.getElementById('inp-video').value = data.path;
    setStatus('Uploaded: ' + data.name, 'done');
  } catch (e) {
    setStatus('Upload error: ' + e.message, 'error');
  } finally {
    setRunBusy(false);
    input.value = '';
  }
}

// ── Run ────────────────────────────────────────────────────────────────
async function runSkill() {
  const video = (document.getElementById('inp-video').value || '').trim();
  const style = document.getElementById('inp-style').value.trim();
  const skill = document.getElementById('inp-skill').value.trim();

  if (!skill) { setStatus('Select a skill first.', 'error'); return; }
  if (!video) { setStatus('Enter a video path.', 'error'); return; }
  if (!style) { setStatus('Enter a style or prompt.', 'error'); return; }

  setRunBusy(true);
  addChatBubble('user', `▶ ${skill} — ${style}`);
  currentStatusBubble = addChatBubble('ai', '正在执行...', 'running');
  setStatus('Submitting task…', 'running');

  try {
    const res = await fetch('/run-skill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ skill_id: selectedSkill || skill, inputs: { video, style } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    const taskId = data.task_id;
    addTask(taskId, 'running');
    activeTaskId = taskId;
    setStatus(`Task ${shortId(taskId)} started — polling…`, 'running');
    schedulePoll(taskId);
  } catch (e) {
    updateStatusBubble('错误: ' + e.message, 'error');
    setStatus('Error: ' + e.message, 'error');
    setRunBusy(false);
  }
}

async function reviseTask() {
  const feedback = document.getElementById('inp-feedback').value.trim();
  if (!activeTaskId) { setStatus('Select or run a task first.', 'error'); return; }
  if (!feedback) { setStatus('Enter revise feedback first.', 'error'); return; }

  setRunBusy(true);
  addChatBubble('user', `修改: ${feedback}`);
  currentStatusBubble = addChatBubble('ai', `正在修改 ${shortId(activeTaskId)}…`, 'running');
  setStatus(`Revising ${shortId(activeTaskId)}…`, 'running');

  try {
    const res = await fetch('/revise-task/' + activeTaskId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    const taskId = data.revision_task_id;
    addTask(taskId, 'running');
    activeTaskId = taskId;
    setStatus(`Revision ${shortId(taskId)} started — polling…`, 'running');
    schedulePoll(taskId);
  } catch (e) {
    updateStatusBubble('修改失败: ' + e.message, 'error');
    setStatus('Revise error: ' + e.message, 'error');
    setRunBusy(false);
  }
}

// ── Polling ────────────────────────────────────────────────────────────
function schedulePoll(taskId, delay = 1500) {
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(() => poll(taskId), delay);
}

async function poll(taskId) {
  try {
    const res = await fetch('/task/' + taskId);
    const task = await res.json();
    const status = (task.status || 'unknown').toLowerCase();

    if (status === 'done' || status === 'completed' || status === 'succeeded') {
      updateTask(taskId, 'done');
      updateStatusBubble('完成 ✓', 'done');
      setStatus('Done! Loading preview…', 'done');
      await showPreview(taskId);
      setAllBusy(false);
    } else if (status === 'error' || status === 'failed') {
      updateTask(taskId, 'error');
      updateStatusBubble('执行失败', 'error');
      setStatus('Task failed: ' + (task.error || status), 'error');
      setAllBusy(false);
    } else {
      updateTask(taskId, status === 'running' ? 'running' : 'pending');
      setStatus(`Status: ${status} — polling…`, 'running');
      schedulePoll(taskId, 2000);
    }
  } catch (e) {
    setStatus('Poll error: ' + e.message, 'error');
    schedulePoll(taskId, 3000);
  }
}

// ── Preview ────────────────────────────────────────────────────────────
async function showPreview(taskId) {
  try {
    const taskRes = await fetch('/task/' + taskId);
    const task = await taskRes.json();
    const previewTaskId = task.latest_preview_task_id || taskId;
    const res = await fetch('/task/' + previewTaskId + '/assets');
    const data = await res.json();
    const mp4 = (data.assets || []).find(a => a.kind === 'mp4' && a.exists);
    if (mp4) {
      const fileUrl = '/file/' + mp4.path;
      loadVideo(fileUrl);
      // show download link in chat
      addDownloadBubble(fileUrl, mp4.path.split('/').pop());
      setStatus('完成 ✓', 'done');
    } else {
      setStatus('Task done — no mp4 output found.', 'done');
    }
  } catch (e) {
    setStatus('Could not load assets: ' + e.message, 'error');
  }
}

function addDownloadBubble(url, filename) {
  const history = document.getElementById('chat-history');
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'bubble-ai done';
  div.innerHTML = `<div class="dot"></div><span>输出就绪 — <a href="${url}" download="${filename}"
    style="color:#4ade80;text-decoration:underline;cursor:pointer">下载 ${filename}</a></span>`;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
}

function loadVideo(url) {
  const preview = document.getElementById('preview');
  preview.innerHTML = '';
  const video = document.createElement('video');
  video.src = url;
  video.controls = true;
  video.autoplay = true;
  video.style.maxWidth = '100%';
  video.style.maxHeight = '100%';
  video.style.borderRadius = '8px';
  preview.appendChild(video);
}

// ── Task history sidebar ───────────────────────────────────────────────
// ── Media pool ────────────────────────────────────────────────────────
async function loadMediaPool() {
  try {
    const res = await fetch('/skills');
    const { inputs } = await res.json();
    renderMediaPool(inputs || []);
    loadInputs(inputs || []);
  } catch (e) { /* ignore */ }
}

function renderMediaPool(inputs) {
  const el = document.getElementById('media-pool');
  if (!inputs.length) {
    el.innerHTML = '<span style="font-size:11px;color:#444;padding:6px">尚未上传视频</span>';
    return;
  }
  el.innerHTML = '';
  inputs.forEach(item => {
    const div = document.createElement('div');
    div.className = 'media-item' + (item.path === selectedVideoPath ? ' selected' : '');
    div.title = item.name;

    // Canvas thumbnail via hidden video
    const canvas = document.createElement('canvas');
    canvas.className = 'media-thumb-canvas';
    canvas.width = 160; canvas.height = 90;
    const vid = document.createElement('video');
    vid.src = '/file/inputs/' + item.name;
    vid.crossOrigin = 'anonymous';
    vid.muted = true;
    vid.preload = 'metadata';
    vid.addEventListener('loadeddata', () => {
      vid.currentTime = 0.5;
    });
    vid.addEventListener('seeked', () => {
      const ctx = canvas.getContext('2d');
      ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
      vid.src = '';
    }, { once: true });

    const name = document.createElement('div');
    name.className = 'media-name';
    name.textContent = item.name;

    div.appendChild(canvas);
    div.appendChild(name);
    div.onclick = () => {
      selectedVideoPath = item.path;
      document.getElementById('inp-video').value = item.path;
      document.querySelectorAll('.media-item').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
    };
    el.appendChild(div);

    // Trigger video load
    vid.load();
  });
}

async function loadTasks() {
  try {
    const res = await fetch('/tasks');
    const data = await res.json();
    tasks = (data.tasks || []).map((t) => ({
      taskId: t.task_id,
      status: String(t.status || 'unknown').toLowerCase() === 'succeeded' ? 'done' : String(t.status || 'unknown').toLowerCase(),
      revisionCount: Number(t.revision_count || 0),
      createdAt: t.created_at || null,
      latestFeedback: t.latest_feedback || '',
      latestStyle: t.latest_style || '',
      latestPreviewTaskId: t.latest_preview_task_id || t.task_id
    }));
    if (activeTaskId) {
      const index = tasks.findIndex(t => t.taskId === activeTaskId);
      if (index > 0) { const [task] = tasks.splice(index, 1); tasks.unshift(task); }
    }
    renderTasks();
  } catch (e) { /* keep default */ }
}

function scheduleTaskRefresh(delay = 5000) {
  if (taskRefreshTimer) clearTimeout(taskRefreshTimer);
  taskRefreshTimer = setTimeout(async () => {
    await loadTasks();
    scheduleTaskRefresh(delay);
  }, delay);
}

function addTask(taskId, status) {
  tasks = tasks.filter(t => t.taskId !== taskId);
  tasks.unshift({ taskId, status, revisionCount: 0, createdAt: new Date().toISOString(), latestFeedback: '', latestPreviewTaskId: taskId });
  renderTasks();
}

function updateTask(taskId, status) {
  const index = tasks.findIndex(t => t.taskId === taskId);
  if (index >= 0) {
    tasks[index].status = status;
    const [task] = tasks.splice(index, 1);
    tasks.unshift(task);
  }
  renderTasks();
}

function renderTasks() {
  const el = document.getElementById('task-list');
  if (!el) return;  // task-list hidden — no-op
  el.innerHTML = '';
  if (!tasks.length) {
    el.innerHTML = '<span style="font-size:11px;color:#444;padding:6px">No tasks yet</span>';
    return;
  }
  tasks.forEach(({ taskId, status, revisionCount, createdAt, latestFeedback, latestStyle, latestPreviewTaskId }) => {
    const div = document.createElement('div');
    div.className = 'list-item' + (taskId === activeTaskId ? ' active' : '');
    div.innerHTML = `<div style="font-weight:500;font-size:12px">Task${revisionCount ? ` · rev ${revisionCount}` : ''}</div>
      <div class="task-id">${shortId(taskId)}</div>
      <div class="task-id">${formatTime(createdAt)}</div>
      ${latestStyle ? `<div class="task-id" title="${escapeHtmlAttr(latestStyle)}">${truncateFeedback(latestStyle)}</div>` : ''}
      ${latestFeedback && latestFeedback !== latestStyle ? `<div class="task-id" title="${escapeHtmlAttr(latestFeedback)}">${truncateFeedback(latestFeedback)}</div>` : ''}
      <span class="badge ${status}">${status}</span>`;
    div.onclick = () => loadTaskById(taskId);
    el.appendChild(div);
  });
}

function escapeHtmlAttr(str) {
  return String(str || '').replace(/"/g, '&quot;');
}

async function loadTaskById(taskId) {
  activeTaskId = taskId;
  renderTasks();
  try {
    const res = await fetch('/task/' + taskId);
    const task = await res.json();
    const latestRevision = (task.revisions || []).at?.(-1) || (task.revisions || [])[task.revisions?.length - 1];
    if (latestRevision?.feedback) {
      document.getElementById('inp-feedback').value = latestRevision.feedback;
      document.getElementById('inp-style').value = latestRevision.feedback;
    } else {
      const style = extractStyleFromGoal(task.goal || '');
      if (style) document.getElementById('inp-style').value = style;
    }
  } catch (e) { /* ignore */ }
  const t = tasks.find(t => t.taskId === taskId);
  if (t && t.status === 'done') {
    await showPreview(taskId);
    setStatus('Loaded: ' + shortId(taskId), 'done');
  } else if (t && t.status === 'running') {
    setStatus('Task is still running…', 'running');
  }
}

// ── Mode switching ─────────────────────────────────────────────────────
function switchMode(mode) {
  ['ai', 'skill'].forEach(m => {
    document.getElementById('tab-' + m).classList.toggle('active', m === mode);
    document.getElementById('mode-' + m).classList.toggle('visible', m === mode);
  });
  dismissAsk();
}

// ── AI Prompt flow ─────────────────────────────────────────────────────
async function runPrompt() {
  const video = (document.getElementById('inp-video').value || '').trim();
  const prompt = (document.getElementById('inp-prompt').value || '').trim();
  if (!prompt) { setStatus('请输入指令。', 'error'); return; }

  // ── /code 命令：让 AI 改底层源码 ──────────────────────────────────────
  if (prompt.startsWith('/code ')) {
    const codePrompt = prompt.slice(6).trim();
    document.getElementById('inp-prompt').value = '';
    setAllBusy(true);
    addChatBubble('user', prompt);
    currentStatusBubble = addChatBubble('ai', '正在修改源码...', 'running');
    setStatus('AI 改源码中…', 'running');
    try {
      const res = await fetch('/dev/gemini-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: codePrompt }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      const applied = (data.applied || []).join(', ') || '无文件变更';
      const reply = (data.summary || '完成') + (data.errors?.length ? ' ⚠ ' + data.errors.join('; ') : '');
      updateStatusBubble('已修改：' + reply + ' [' + applied + ']', 'done');
      setStatus('源码已更新', 'done');
    } catch (e) {
      updateStatusBubble('改源码失败: ' + e.message, 'error');
      setStatus('改源码失败', 'error');
    }
    setAllBusy(false);
    return;
  }

  if (!video) { setStatus('请先上传或选择视频。', 'error'); return; }

  document.getElementById('inp-prompt').value = '';
  setAllBusy(true);
  dismissAsk();
  addChatBubble('user', prompt);
  currentStatusBubble = addChatBubble('ai', '正在规划...', 'running');
  setStatus('AI 规划中…', 'running');

  try {
    const res = await fetch('/run-prompt', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, video }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    if (data.ask) {
      updateStatusBubble('AI 需要更多信息', 'asking');
      showAskPanel(data.ask_id, data.questions);
      setStatus('AI has a few questions…', 'running');
    } else {
      const taskId = data.task_id;
      addTask(taskId, 'running');
      activeTaskId = taskId;
      updateStatusBubble('正在执行...', 'running');
      setStatus(`Plan generated — executing task ${shortId(taskId)}…`, 'running');
      schedulePoll(taskId);
    }
  } catch (e) {
    updateStatusBubble('错误: ' + e.message, 'error');
    setStatus('Error: ' + e.message, 'error');
    setAllBusy(false);
  }
}

function showAskPanel(askId, questions) {
  currentAskId = askId;
  const panel = document.getElementById('ask-panel');
  const container = document.getElementById('ask-questions');
  container.innerHTML = '';
  (questions || []).forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'ask-question';
    div.innerHTML = `<label>${escapeHtml(q)}</label><input type="text" id="ask-q-${i}" placeholder="Your answer…">`;
    container.appendChild(div);
  });
  panel.classList.add('visible');
  setAllBusy(false);
  const first = document.getElementById('ask-q-0');
  if (first) first.focus();
}

function dismissAsk() {
  currentAskId = null;
  document.getElementById('ask-panel').classList.remove('visible');
  document.getElementById('ask-questions').innerHTML = '';
}

async function submitAnswers() {
  if (!currentAskId) return;
  const inputs = document.querySelectorAll('#ask-questions .ask-question input');
  const labels = document.querySelectorAll('#ask-questions .ask-question label');
  const answers = {};
  inputs.forEach((inp, i) => {
    const q = labels[i] ? labels[i].textContent : `q${i}`;
    answers[q] = inp.value.trim();
  });
  const emptyCount = Object.values(answers).filter(v => !v).length;
  if (emptyCount === inputs.length) { setStatus('Please answer at least one question.', 'error'); return; }

  setAllBusy(true);
  const answersText = Object.entries(answers).map(([q, a]) => `${q}: ${a}`).join('\n');
  addChatBubble('user', answersText);
  currentStatusBubble = addChatBubble('ai', '正在处理回答...', 'running');
  setStatus('Sending answers to AI…', 'running');
  document.getElementById('ask-submit-btn').disabled = true;

  try {
    const res = await fetch('/answer-ask/' + currentAskId, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    if (data.ask) {
      updateStatusBubble('AI 需要更多信息', 'asking');
      showAskPanel(data.ask_id, data.questions);
      setStatus('AI needs a bit more info…', 'running');
    } else {
      dismissAsk();
      const taskId = data.task_id;
      addTask(taskId, 'running');
      activeTaskId = taskId;
      updateStatusBubble('正在执行...', 'running');
      setStatus(`Plan ready — executing ${shortId(taskId)}…`, 'running');
      schedulePoll(taskId);
    }
  } catch (e) {
    updateStatusBubble('错误: ' + e.message, 'error');
    setStatus('Error: ' + e.message, 'error');
    setAllBusy(false);
  }
}

// ── DEV drawer ─────────────────────────────────────────────────────────
function toggleDev() {
  document.getElementById('dev-drawer').classList.toggle('open');
}

async function sendDevFeedback() {
  const input = document.getElementById('dev-input');
  const text = input.value.trim();
  if (!text) return;

  const log = document.getElementById('dev-log');
  const userDiv = document.createElement('div');
  userDiv.className = 'dev-entry-user';
  userDiv.textContent = text;
  log.appendChild(userDiv);
  log.scrollTop = log.scrollHeight;
  input.value = '';

  try {
    await fetch('/dev-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feedback: text }),
    });
    const ccDiv = document.createElement('div');
    ccDiv.className = 'dev-entry-cc';
    ccDiv.textContent = '已记录，等待 cc 处理...';
    log.appendChild(ccDiv);
    log.scrollTop = log.scrollHeight;
  } catch (e) {
    const errDiv = document.createElement('div');
    errDiv.className = 'dev-entry-cc';
    errDiv.textContent = '发送失败: ' + e.message;
    log.appendChild(errDiv);
    log.scrollTop = log.scrollHeight;
  }
}

// Enter to send in dev input
document.getElementById('dev-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.metaKey) { e.preventDefault(); sendDevFeedback(); }
});

// ── Utils ──────────────────────────────────────────────────────────────
function shortId(id) {
  return id.replace(/^task_/, '').slice(-18);
}

function formatTime(value) {
  if (!value) return 'time unknown';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return 'time unknown';
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function truncateFeedback(text, max = 22) {
  const s = String(text || '').trim();
  if (!s) return '';
  return s.length > max ? s.slice(0, max - 1) + '…' : s;
}

function extractStyleFromGoal(goal) {
  const s = String(goal || '');
  const marker = 'with style:';
  const idx = s.toLowerCase().indexOf(marker);
  if (idx === -1) return '';
  return s.slice(idx + marker.length).trim();
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-line ' + (cls || '');
}

function setRunBusy(busy) {
  document.getElementById('run-btn').disabled = busy;
  document.getElementById('revise-btn').disabled = busy;
}

function setAllBusy(busy) {
  setRunBusy(busy);
  const aiBtn = document.getElementById('ai-run-btn');
  if (aiBtn) aiBtn.disabled = busy;
  const askBtn = document.getElementById('ask-submit-btn');
  if (askBtn) askBtn.disabled = busy;
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
