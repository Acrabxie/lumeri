[project]
name = "gemia"
version = "0.1.0"
description = "AI-native video/image/audio workbench"
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
    "Pillow>=11.0",
    "opencv-python>=4.9",
    "scikit-image>=0.22",
    "librosa>=0.10",
    "pydub>=0.25",
    "soundfile>=0.12",
    "scipy>=1.12",
    "certifi",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.backends._legacy:_Backend"
